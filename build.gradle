plugins {
	id 'java-library'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'org.atlas.flight'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

repositories {
	mavenCentral()
}

dependencyManagement {
	imports {
		mavenBom 'org.springframework:spring-framework-bom:6.2.8'
	}
}

dependencies {
	// Spring Framework 버전은 위 BOM으로 통일 (앞으로 spring-* 모듈 추가 시에도 동일)
	api 'org.springframework:spring-context'

	// OpenAPI 문서·Swagger UI·springdoc — 서비스 모듈에서 동일 버전으로 api 전파 (BOM 비포함, 버전 명시)
	api 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.6'
	// DTO Bean Validation API — 구현체는 각 애플리케이션 모듈에서
	api 'jakarta.validation:jakarta.validation-api:3.1.1'

	implementation 'commons-codec:commons-codec:1.16.1'

	implementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'

	compileOnly 'org.projectlombok:lombok:1.18.38'
	annotationProcessor 'org.projectlombok:lombok:1.18.38'

	testImplementation platform('org.junit:junit-bom:5.11.4')
	testImplementation 'org.junit.jupiter:junit-jupiter'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
